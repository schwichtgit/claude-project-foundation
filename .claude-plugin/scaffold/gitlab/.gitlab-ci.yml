# Host project GitLab CI configuration.
# Plugin-owned jobs are in ci/gitlab/gitlab-ci-base.yml (overwrite tier).
# This file is skip tier -- specforge upgrade will not modify it.
# Add project-specific jobs below the extension point marker.

include:
  - local: '/ci/gitlab/gitlab-ci-base.yml'

# ===========================================================================
# PROJECT-SPECIFIC JOBS -- add your jobs below this marker.
# specforge upgrade will not touch this file after init.
# ===========================================================================

