name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  # ---------------------------------------------------------------------------
  # Validate tag version matches plugin.json
  # ---------------------------------------------------------------------------
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Extract and compare versions
        id: version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)

          echo "Tag version:    $TAG_VERSION"
          echo "Plugin version: $PLUGIN_VERSION"

          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "FAIL: Tag version ($TAG_VERSION) does not match plugin.json version ($PLUGIN_VERSION)"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "PASS: versions match"

  # ---------------------------------------------------------------------------
  # Lint and validation (mirrors CI checks)
  # ---------------------------------------------------------------------------
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: |
          find . -name '*.sh' -not -path './.git/*' -not -path './node_modules/*' -print0 | xargs -0 shellcheck -x
          find .claude-plugin/scaffold/common/scripts/hooks -type f -not -name '*.md' -print0 | xargs -0 shellcheck -x

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'

  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install
      - run: npx prettier --check .

  plugin-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate plugin.json
        run: |
          jq empty .claude-plugin/plugin.json
          jq -e '.name' .claude-plugin/plugin.json > /dev/null
          jq -e '.version' .claude-plugin/plugin.json > /dev/null
          jq -e '.hooks' .claude-plugin/plugin.json > /dev/null
      - name: Validate referenced paths
        run: |
          SKILLS_PATH=$(jq -r '.skills // empty' .claude-plugin/plugin.json)
          [ -z "$SKILLS_PATH" ] || test -d "$SKILLS_PATH" || { echo "FAIL: $SKILLS_PATH"; exit 1; }
          for path in $(jq -r '.agents[]? // empty' .claude-plugin/plugin.json); do
            test -f "$path" || { echo "FAIL: $path"; exit 1; }
          done
      - name: Validate hooks.json
        run: |
          HOOKS_PATH=$(jq -r '.hooks' .claude-plugin/plugin.json)
          jq empty "$HOOKS_PATH"
          jq -r '.. | .command? // empty' "$HOOKS_PATH" | while IFS= read -r cmd; do
            SCRIPT=$(echo "$cmd" | sed 's|\${CLAUDE_PLUGIN_ROOT}|.|g')
            test -f "$SCRIPT" || { echo "FAIL: $SCRIPT"; exit 1; }
          done

  # ---------------------------------------------------------------------------
  # Create GitHub release with artifact attestation
  # ---------------------------------------------------------------------------
  release:
    needs:
      [validate-version, shellcheck, markdownlint, prettier, plugin-validation]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create release tarball
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          tar -czf "cpf-${VERSION}.tar.gz" \
            --exclude='.git' \
            --exclude='node_modules' \
            .claude-plugin/
          echo "ARTIFACT=cpf-${VERSION}.tar.gz" >> "$GITHUB_ENV"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: ${{ env.ARTIFACT }}
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          gh release create "$GITHUB_REF_NAME" \
            "${{ env.ARTIFACT }}" \
            --title "cpf v${VERSION}" \
            --generate-notes
