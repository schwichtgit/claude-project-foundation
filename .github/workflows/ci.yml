name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Markdown lint
  # ---------------------------------------------------------------------------
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: '**/*.md'

  # ---------------------------------------------------------------------------
  # Prettier format check
  # ---------------------------------------------------------------------------
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm install
      - run: npx prettier --check .

  # ---------------------------------------------------------------------------
  # Shell script lint
  # ---------------------------------------------------------------------------
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Seed shellcheck-excludes from bundled policy
        run: |
          # The cpf source repo has a hand-edited .markdownlint-cli2.yaml and
          # .prettierignore that the generator would overwrite. Stage the
          # generator output in a temp dir and copy just the excludes file.
          STAGE="$(mktemp -d)"
          CPF_POLICY_FILE=.claude-plugin/scaffold/common/.cpf/policy.json \
            bash .claude-plugin/lib/cpf-generate-configs.sh --project-dir "$STAGE"
          mkdir -p .cpf
          cp "$STAGE/.cpf/shellcheck-excludes.txt" .cpf/shellcheck-excludes.txt
      - name: Run shellcheck
        run: |
          FRAGMENT="$(bash .claude-plugin/lib/cpf-shellcheck-fragment.sh emit-find-fragment .)"
          eval "find . -name '*.sh' $FRAGMENT -print0" | xargs -0 shellcheck -x
          find .claude-plugin/scaffold/common/.cpf/scripts/hooks -type f -not -name '*.md' -print0 | xargs -0 shellcheck -x
      - name: Resolver-usage lint
        run: bash .claude-plugin/lib/lint-resolver-usage.sh
      - name: Namespace discipline check
        run: bash scripts/check-namespace-discipline.sh
      - name: Namespace discipline test
        run: bash scripts/test-namespace-discipline.sh
      - name: Policy loader and validator test
        run: bash scripts/test-policy.sh
      - name: Orchestrator dispatch test
        run: bash scripts/test-orchestrator-dispatch.sh
      - name: Jenkinsfile upstream-cache flow test
        run: bash scripts/test-jenkinsfile-review.sh
      - name: Config generation test
        run: bash scripts/test-config-generation.sh
      - name: Config generation determinism check
        run: bash scripts/check-config-determinism.sh
      - name: Shellcheck find-fragment helper test
        run: bash scripts/test-shellcheck-fragment.sh
      - name: Native tool config hook test
        run: bash scripts/test-native-tool-config.sh

  # ---------------------------------------------------------------------------
  # Commit standards (PR only)
  # ---------------------------------------------------------------------------
  commit-standards:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate commits
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          ERRORS=0
          while IFS= read -r sha; do
            MSG=$(git log --format='%s' -n 1 "$sha")

            # Skip merge commits (e.g. from branch updates, Dependabot)
            if echo "$MSG" | grep -qE '^Merge '; then
              continue
            fi

            # Conventional commit format
            if ! echo "$MSG" | grep -qE '^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?: .+'; then
              echo "FAIL [$sha]: Not conventional commit format: $MSG"
              ERRORS=$((ERRORS + 1))
            fi

            # Subject length
            if [ ${#MSG} -gt 72 ]; then
              echo "WARN [$sha]: Subject exceeds 72 chars: $MSG"
            fi

            # Emoji
            if echo "$MSG" | python3 -c "
          import sys, re
          text = sys.stdin.read()
          pattern = re.compile('[\U0001F300-\U0001F9FF\U00002600-\U000027BF]+', re.UNICODE)
          sys.exit(0 if pattern.search(text) else 1)
          " 2>/dev/null; then
              echo "FAIL [$sha]: Emoji in commit message: $MSG"
              ERRORS=$((ERRORS + 1))
            fi

            # AI-isms
            if echo "$MSG" | grep -qiE '\b(I have|I'\''ve|I updated|I fixed|Certainly|seamless|robust|powerful|elegant)\b'; then
              echo "FAIL [$sha]: AI-ism detected: $MSG"
              ERRORS=$((ERRORS + 1))
            fi

          done < <(git rev-list "$BASE".."$HEAD")

          if [ $ERRORS -gt 0 ]; then
            echo ""
            echo "Commit standards check failed: $ERRORS error(s)."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Plugin validation
  # ---------------------------------------------------------------------------
  plugin-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate plugin.json
        run: |
          echo "--- plugin.json structure ---"
          jq empty .claude-plugin/plugin.json
          echo "PASS: plugin.json is valid JSON"

          # Verify required fields
          jq -e '.name' .claude-plugin/plugin.json > /dev/null
          jq -e '.version' .claude-plugin/plugin.json > /dev/null
          jq -e '.hooks' .claude-plugin/plugin.json > /dev/null
          echo "PASS: required fields present"
      - name: Validate referenced paths
        run: |
          echo "--- Checking skills directory ---"
          SKILLS_PATH=$(jq -r '.skills // empty' .claude-plugin/plugin.json)
          if [ -n "$SKILLS_PATH" ]; then
            test -d "$SKILLS_PATH" || { echo "FAIL: $SKILLS_PATH not found"; exit 1; }
            echo "  OK: $SKILLS_PATH"
          fi

          echo "--- Checking agent files ---"
          for path in $(jq -r '.agents[]? // empty' .claude-plugin/plugin.json); do
            test -f "$path" || { echo "FAIL: $path not found"; exit 1; }
            echo "  OK: $path"
          done
          echo "PASS: all referenced paths exist"
      - name: Validate hooks.json
        run: |
          HOOKS_PATH=$(jq -r '.hooks' .claude-plugin/plugin.json)

          echo "--- hooks.json structure ---"
          jq empty "$HOOKS_PATH"
          echo "PASS: hooks.json is valid JSON"

          echo "--- Checking hook script paths ---"
          jq -r '.. | .command? // empty' "$HOOKS_PATH" | while IFS= read -r cmd; do
            SCRIPT=$(echo "$cmd" | sed 's|\${CLAUDE_PLUGIN_ROOT}|.|g')
            if [ ! -f "$SCRIPT" ]; then
              echo "FAIL: $SCRIPT not found (from $cmd)"
              exit 1
            fi
            echo "  OK: $cmd"
          done
          echo "PASS: all hook scripts exist"
      - name: Validate SKILL.md exists
        run: |
          SKILLS_PATH=$(jq -r '.skills // empty' .claude-plugin/plugin.json)
          find "$SKILLS_PATH" -name 'SKILL.md' | head -1 | grep -q .
          echo "PASS: SKILL.md exists in $SKILLS_PATH"

  # ---------------------------------------------------------------------------
  # Summary (ONLY job to require in branch protection)
  # ---------------------------------------------------------------------------
  summary:
    if: always()
    needs:
      [markdownlint, prettier, shellcheck, commit-standards, plugin-validation]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Markdown:  ${{ needs.markdownlint.result }}"
          echo "Prettier:  ${{ needs.prettier.result }}"
          echo "Shell:     ${{ needs.shellcheck.result }}"
          echo "Commits:   ${{ needs.commit-standards.result }}"
          echo "Plugin:    ${{ needs.plugin-validation.result }}"

          for result in "${{ needs.markdownlint.result }}" "${{ needs.prettier.result }}" "${{ needs.shellcheck.result }}" "${{ needs.commit-standards.result }}" "${{ needs.plugin-validation.result }}"; do
            if [[ "$result" == "failure" ]]; then
              echo "One or more checks failed."
              exit 1
            fi
          done

          echo "All checks passed."
